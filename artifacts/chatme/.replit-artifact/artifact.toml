kind = "web"
previewPath = "/"
title = "ChatMe"
version = "1.0.0"
id = "artifacts/chatme"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22514

[services.development]
run = "pnpm --filter @workspace/chatme run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatme", "run", "build" ]
publicDir = "artifacts/chatme/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22514"
BASE_PATH = "/"
